<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Invoice Parser Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #1b5e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .reset-header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .reset-header h1 {
            color: #1b5e20;
            font-size: 24px;
            font-weight: 700;
        }

        .reset-header p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .reset-header .email-display {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            color: #1b5e20;
            margin-top: 12px;
        }

        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .otp-input {
            width: 50px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .otp-input:focus {
            outline: none;
            border-color: #1b5e20;
            box-shadow: 0 0 0 3px rgba(27, 94, 32, 0.1);
            transform: scale(1.05);
        }

        .otp-input.error {
            border-color: #f44336;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1b5e20;
            box-shadow: 0 0 0 3px rgba(27, 94, 32, 0.1);
        }

        .btn-reset-password {
            width: 100%;
            padding: 14px;
            background: #1b5e20;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .btn-reset-password:hover {
            background: #0d3a1a;
            box-shadow: 0 4px 16px rgba(27, 94, 32, 0.3);
        }

        .btn-reset-password:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-resend {
            background: transparent;
            color: #1b5e20;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .btn-resend:hover {
            text-decoration: underline;
        }

        .btn-resend:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        .message.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }

        .timer {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 16px;
        }

        .timer span {
            font-weight: 700;
            color: #1b5e20;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1b5e20;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 6px;
            transition: all 0.3s ease;
            background: #e0e0e0;
        }

        .password-strength.weak { background: #f44336; width: 33%; }
        .password-strength.medium { background: #ff9800; width: 66%; }
        .password-strength.strong { background: #4caf50; width: 100%; }

        .footer {
            text-align: center;
            margin-top: 16px;
        }

        .btn-back {
            background: transparent;
            color: #1b5e20;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .reset-container {
                padding: 32px 20px;
            }

            .otp-input {
                width: 40px;
                height: 48px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <div class="icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Enter the OTP sent to your email and set a new password</p>
            <div class="email-display" id="emailDisplay">email@example.com</div>
        </div>

        <div id="message" class="message"></div>

        <form id="resetForm" onsubmit="handleResetPassword(event)">
            <div class="otp-input-group" id="otpGroup">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp1" oninput="moveNext(this, 'otp2')" autofocus>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp2" oninput="moveNext(this, 'otp3')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp3" oninput="moveNext(this, 'otp4')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp4" oninput="moveNext(this, 'otp5')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp5" oninput="moveNext(this, 'otp6')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp6" oninput="moveNext(this, null)">
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input 
                    type="password" 
                    id="newPassword" 
                    placeholder="Enter new password (min 6 characters)"
                    required
                    oninput="checkPasswordStrength(this.value)"
                >
                <div class="password-strength" id="passwordStrength"></div>
                <div class="password-hint">Minimum 6 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Confirm your new password"
                    required
                >
            </div>

            <button type="submit" class="btn-reset-password" id="resetBtn">
                Reset Password
            </button>
        </form>

        <div style="text-align: center; margin-top: 12px;">
            <button class="btn-resend" id="resendBtn" onclick="resendOTP()">
                Resend OTP
            </button>
        </div>

        <div class="timer" id="timer">
            OTP expires in <span id="countdown">10:00</span>
        </div>

        <div class="footer">
            <button class="btn-back" onclick="window.location.href='/login'">
                ← Back to Login
            </button>
        </div>
    </div>

    <script>
        let email = '';
        let countdownInterval = null;
        let timeLeft = 600;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            email = urlParams.get('email');

            if (!email) {
                window.location.href = '/forgot-password';
                return;
            }

            document.getElementById('emailDisplay').textContent = email;
            startCountdown();
        };

        function moveNext(current, nextId) {
            const value = current.value;
            if (value && !/^\d$/.test(value)) {
                current.value = '';
                return;
            }

            if (value && nextId) {
                document.getElementById(nextId).focus();
            }

            const inputs = document.querySelectorAll('.otp-input');
            const allFilled = Array.from(inputs).every(input => input.value.length === 1);
            if (allFilled) {
                // Auto-focus on password field when OTP is complete
                document.getElementById('newPassword').focus();
            }
        }

        function startCountdown() {
            const countdownEl = document.getElementById('countdown');
            
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            timeLeft = 600;
            updateCountdownDisplay();

            countdownInterval = setInterval(() => {
                timeLeft--;
                updateCountdownDisplay();

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('resendBtn').disabled = false;
                    document.getElementById('timer').innerHTML = 'OTP has expired. <button class="btn-resend" onclick="resendOTP()">Resend OTP</button>';
                }
            }, 1000);
        }

        function updateCountdownDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('countdown').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function checkPasswordStrength(password) {
            const strengthEl = document.getElementById('passwordStrength');
            if (password.length === 0) {
                strengthEl.className = 'password-strength';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            if (strength <= 1) strengthEl.className = 'password-strength weak';
            else if (strength <= 3) strengthEl.className = 'password-strength medium';
            else strengthEl.className = 'password-strength strong';
        }

        function showMessage(message, type = 'error') {
            const msgEl = document.getElementById('message');
            msgEl.textContent = message;
            msgEl.className = `message show ${type}`;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        function setError() {
            document.querySelectorAll('.otp-input').forEach(input => {
                input.classList.add('error');
            });
            setTimeout(() => {
                document.querySelectorAll('.otp-input').forEach(input => {
                    input.classList.remove('error');
                });
            }, 500);
        }

        function showFieldError(fieldId, message) {
            const field = document.getElementById(fieldId);
            field.classList.add('error');
            field.classList.remove('success');
            
            let errorEl = document.getElementById(`${fieldId}-error`);
            if (!errorEl) {
                errorEl = document.createElement('div');
                errorEl.id = `${fieldId}-error`;
                errorEl.style.cssText = 'font-size: 12px; color: #f44336; margin-top: 4px;';
                field.parentNode.appendChild(errorEl);
            }
            errorEl.textContent = message;
        }

        function showFieldSuccess(fieldId, message) {
            const field = document.getElementById(fieldId);
            field.classList.remove('error');
            field.classList.add('success');
            
            let successEl = document.getElementById(`${fieldId}-success`);
            if (!successEl) {
                successEl = document.createElement('div');
                successEl.id = `${fieldId}-success`;
                successEl.style.cssText = 'font-size: 12px; color: #4caf50; margin-top: 4px;';
                field.parentNode.appendChild(successEl);
            }
            successEl.textContent = message;
        }

        function clearFieldFeedback(fieldId) {
            const field = document.getElementById(fieldId);
            field.classList.remove('error');
            field.classList.remove('success');
            
            const errorEl = document.getElementById(`${fieldId}-error`);
            if (errorEl) errorEl.remove();
            
            const successEl = document.getElementById(`${fieldId}-success`);
            if (successEl) successEl.remove();
        }

        // Password match validation
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('newPassword').value;
            const confirm = this.value;
            clearFieldFeedback('confirmPassword');
            
            if (confirm.length === 0) return;
            
            if (password !== confirm) {
                showFieldError('confirmPassword', '✗ Passwords do not match');
            } else {
                showFieldSuccess('confirmPassword', '✓ Passwords match');
            }
        });

        // Clear feedback on focus
        document.querySelectorAll('.form-group input').forEach(input => {
            input.addEventListener('focus', function() {
                clearFieldFeedback(this.id);
                hideMessage();
            });
        });

        async function handleResetPassword(event) {
            event.preventDefault();
            hideMessage();

            const otpInputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');

            if (otp.length !== 6) {
                showMessage('Please enter the complete 6-digit OTP', 'error');
                setError();
                return;
            }

            if (newPassword.length < 6) {
                showFieldError('newPassword', 'Password must be at least 6 characters');
                return;
            }

            if (newPassword !== confirmPassword) {
                showFieldError('confirmPassword', 'Passwords do not match');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="loading-spinner"></span> Resetting password...';

            try {
                const response = await fetch('/api/verify-reset-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        otp: otp,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✓ Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Failed to reset password', 'error');
                    setError();
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = 'Reset Password';
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Reset Password';
            }
        }

        async function resendOTP() {
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/request-password-reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✓ New OTP sent to your email', 'success');
                    startCountdown();
                } else {
                    showMessage(data.message || 'Failed to resend OTP', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                resendBtn.disabled = false;
                resendBtn.textContent = 'Resend OTP';
            }
        }

        // Backspace navigation
        document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Paste support
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const digits = paste.replace(/\D/g, '').slice(0, 6);
                const inputsArray = Array.from(inputs);
                digits.split('').forEach((digit, i) => {
                    if (inputsArray[i]) {
                        inputsArray[i].value = digit;
                    }
                });
                if (digits.length === 6) {
                    document.getElementById('newPassword').focus();
                }
            });
        });
    </script>
</body>
</html>
