<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Invoice Parser Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #1b5e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .verify-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .verify-header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .verify-header h1 {
            color: #1b5e20;
            font-size: 24px;
            font-weight: 700;
        }

        .verify-header p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .verify-header .email-display {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            color: #1b5e20;
            margin-top: 12px;
            word-break: break-all;
        }

        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .otp-input {
            width: 50px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .otp-input:focus {
            outline: none;
            border-color: #1b5e20;
            box-shadow: 0 0 0 3px rgba(27, 94, 32, 0.1);
            transform: scale(1.05);
        }

        .otp-input.error {
            border-color: #f44336;
            animation: shake 0.5s ease;
        }

        .otp-input.success {
            border-color: #4caf50;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .btn-verify {
            width: 100%;
            padding: 14px;
            background: #1b5e20;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-verify:hover {
            background: #0d3a1a;
            box-shadow: 0 4px 16px rgba(27, 94, 32, 0.3);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-resend {
            background: transparent;
            color: #1b5e20;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .btn-resend:hover {
            text-decoration: underline;
        }

        .btn-resend:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-back {
            background: transparent;
            color: #1b5e20;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .btn-back:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        .message.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }

        .message.info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            color: #1565c0;
        }

        .timer {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 16px;
        }

        .timer span {
            font-weight: 700;
            color: #1b5e20;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1b5e20;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .verify-container {
                padding: 32px 20px;
            }

            .otp-input {
                width: 40px;
                height: 48px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-header">
            <div class="icon">📧</div>
            <h1>Verify Your Email</h1>
            <p>Enter the 6-digit code sent to</p>
            <div class="email-display" id="emailDisplay">email@example.com</div>
        </div>

        <div id="message" class="message"></div>

        <form id="verifyForm" onsubmit="handleVerify(event)">
            <div class="otp-input-group" id="otpGroup">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp1" oninput="moveNext(this, 'otp2')" autofocus>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp2" oninput="moveNext(this, 'otp3')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp3" oninput="moveNext(this, 'otp4')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp4" oninput="moveNext(this, 'otp5')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp5" oninput="moveNext(this, 'otp6')">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp6" oninput="moveNext(this, null)">
            </div>

            <button type="submit" class="btn-verify" id="verifyBtn">
                Verify Email
            </button>
        </form>

        <div style="text-align: center; margin-top: 12px;">
            <button class="btn-resend" id="resendBtn" onclick="resendOTP()">
                Resend OTP
            </button>
        </div>

        <div class="timer" id="timer">
            OTP expires in <span id="countdown">10:00</span>
        </div>

        <div class="footer">
            <button class="btn-back" onclick="window.location.href='/register'">
                ← Back to Registration
            </button>
        </div>
    </div>

    <script>
        // ============================================================================
        // VARIABLES
        // ============================================================================

        let email = '';
        let username = '';
        let password = '';
        let countdownInterval = null;
        let timeLeft = 600;

        // ============================================================================
        // PAGE LOAD
        // ============================================================================

        window.onload = function() {
            // Try to get email from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            email = urlParams.get('email');
            
            // Try to get username and password from session storage
            username = sessionStorage.getItem('register_username') || '';
            password = sessionStorage.getItem('register_password') || '';
            
            // If email is in session storage but not URL, use that
            if (!email) {
                email = sessionStorage.getItem('register_email') || '';
            }

            // If still no email, redirect to register
            if (!email) {
                showMessage('No email found. Please register first.', 'error');
                setTimeout(() => {
                    window.location.href = '/register';
                }, 2000);
                return;
            }

            // Display email
            document.getElementById('emailDisplay').textContent = email;
            startCountdown();

            // Log for debugging
            console.log('Verifying for email:', email);
            console.log('Username from session:', username);
        };

        // ============================================================================
        // OTP INPUT HANDLING
        // ============================================================================

        function moveNext(current, nextId) {
            const value = current.value;
            if (value && !/^\d$/.test(value)) {
                current.value = '';
                return;
            }

            if (value && nextId) {
                document.getElementById(nextId).focus();
            }

            // Auto-submit when all fields filled
            const inputs = document.querySelectorAll('.otp-input');
            const allFilled = Array.from(inputs).every(input => input.value.length === 1);
            if (allFilled) {
                document.getElementById('verifyForm').dispatchEvent(new Event('submit'));
            }
        }

        // ============================================================================
        // COUNTDOWN TIMER
        // ============================================================================

        function startCountdown() {
            const countdownEl = document.getElementById('countdown');
            
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            timeLeft = 600;
            updateCountdownDisplay();

            countdownInterval = setInterval(() => {
                timeLeft--;
                updateCountdownDisplay();

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('resendBtn').disabled = false;
                    document.getElementById('timer').innerHTML = 'OTP has expired. <button class="btn-resend" onclick="resendOTP()">Resend OTP</button>';
                }
            }, 1000);
        }

        function updateCountdownDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('countdown').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // ============================================================================
        // MESSAGE FUNCTIONS
        // ============================================================================

        function showMessage(message, type = 'error') {
            const msgEl = document.getElementById('message');
            msgEl.textContent = message;
            msgEl.className = `message show ${type}`;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        function setError() {
            document.querySelectorAll('.otp-input').forEach(input => {
                input.classList.add('error');
                input.classList.remove('success');
            });
            setTimeout(() => {
                document.querySelectorAll('.otp-input').forEach(input => {
                    input.classList.remove('error');
                });
            }, 500);
        }

        function setSuccess() {
            document.querySelectorAll('.otp-input').forEach(input => {
                input.classList.remove('error');
                input.classList.add('success');
            });
        }

        // ============================================================================
        // VERIFY OTP
        // ============================================================================

        async function handleVerify(event) {
            event.preventDefault();
            hideMessage();

            const otpInputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(otpInputs).map(input => input.value).join('');

            // Validate OTP
            if (otp.length !== 6) {
                showMessage('Please enter the complete 6-digit OTP', 'error');
                setError();
                return;
            }

            // Check if we have username and password
            if (!username || !password) {
                // Try to get from session storage again
                username = sessionStorage.getItem('register_username') || '';
                password = sessionStorage.getItem('register_password') || '';
                
                if (!username || !password) {
                    showMessage('Session expired. Please register again.', 'error');
                    setTimeout(() => {
                        window.location.href = '/register';
                    }, 2000);
                    return;
                }
            }

            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loading-spinner"></span> Verifying...';

            try {
                console.log('Sending verification with:', { email, otp, username, password: '***' });

                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        otp: otp,
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    setSuccess();
                    showMessage('✓ Email verified successfully! Redirecting...', 'success');
                    sessionStorage.clear();
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Verification failed', 'error');
                    setError();
                    verifyBtn.disabled = false;
                    verifyBtn.innerHTML = 'Verify Email';
                }
            } catch (error) {
                console.error('Verification error:', error);
                showMessage('Network error. Please try again.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'Verify Email';
            }
        }

        // ============================================================================
        // RESEND OTP
        // ============================================================================

        async function resendOTP() {
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/resend-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✓ New OTP sent to your email', 'success');
                    startCountdown();
                } else {
                    showMessage(data.message || 'Failed to resend OTP', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                resendBtn.disabled = false;
                resendBtn.textContent = 'Resend OTP';
            }
        }

        // ============================================================================
        // KEYBOARD NAVIGATION
        // ============================================================================

        document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
            // Backspace navigation
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Paste support
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const digits = paste.replace(/\D/g, '').slice(0, 6);
                const inputsArray = Array.from(inputs);
                digits.split('').forEach((digit, i) => {
                    if (inputsArray[i]) {
                        inputsArray[i].value = digit;
                    }
                });
                if (digits.length === 6) {
                    document.getElementById('verifyForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
