version: '3.8'

services:
  invoice-parser:
    build: .
    container_name: invoice-parser-app
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./parser.db:/app/parser.db
    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
