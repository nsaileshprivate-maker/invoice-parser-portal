<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Invoice Parser Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #1b5e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .forgot-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .forgot-header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .forgot-header h1 {
            color: #1b5e20;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .forgot-header p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1b5e20;
            box-shadow: 0 0 0 3px rgba(27, 94, 32, 0.1);
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background: #1b5e20;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-reset:hover {
            background: #0d3a1a;
            box-shadow: 0 4px 16px rgba(27, 94, 32, 0.3);
            transform: translateY(-2px);
        }

        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-back {
            background: transparent;
            color: #1b5e20;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .btn-back:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        .message.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }

        .message.info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            color: #1565c0;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1b5e20;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .forgot-container {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <div class="icon">🔑</div>
            <h1>Forgot Password</h1>
            <p>Enter your email to receive a password reset OTP</p>
        </div>

        <div id="message" class="message"></div>

        <form id="forgotForm" onsubmit="handleForgotPassword(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your registered email"
                    required
                    autofocus
                >
            </div>

            <button type="submit" class="btn-reset" id="resetBtn">
                Send Reset OTP
            </button>
        </form>

        <div class="footer">
            <button class="btn-back" onclick="window.location.href='/login'">
                ← Back to Login
            </button>
        </div>
    </div>

    <script>
        function showMessage(message, type = 'error') {
            const msgEl = document.getElementById('message');
            msgEl.textContent = message;
            msgEl.className = `message show ${type}`;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        async function handleForgotPassword(event) {
            event.preventDefault();
            hideMessage();

            const email = document.getElementById('email').value.trim();
            const resetBtn = document.getElementById('resetBtn');

            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="loading-spinner"></span> Sending...';

            try {
                const response = await fetch('/api/request-password-reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✓ OTP sent to your email! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
                    }, 1500);
                } else {
                    showMessage(data.message || 'Failed to send reset OTP', 'error');
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = 'Send Reset OTP';
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Send Reset OTP';
            }
        }
    </script>
</body>
</html>
